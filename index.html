<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>% Percentage Calculator</title>
    <!-- Google Fonts: Space Grotesk and Inter for modern crypto feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) - still using icon set but no dollar sign, replaced with pi symbol and crypto glyphs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>    
</head>
<body>

<div class="calculator-card">
    <div class="card-header">
        <h2>
            <span class="pi-symbol">π</span>
            Pi Split
        </h2>
        <p>precise PI Coin balance & shares • 45% / 55% split</p>
    </div>

    <div class="form-container">
        <div class="input-group">
            <label><i class="fas fa-chart-simple"></i> Total PI Amount</label>
            <div class="input-wrapper">
                <i class="fas fa-coins"></i>
                <input type="number" id="totalInput" placeholder="0.00 π" step="any" value="">
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-gas-pump"></i> Fee / Deduction (π)</label>
            <div class="input-wrapper">
                <i class="fas fa-scissors"></i>
                <input type="number" id="feeInput" placeholder="0.00 π" step="any" value="">
            </div>
        </div>

        <button class="calc-btn" id="calculateBtn">
            <i class="fas fa-calculator"></i> Calculate π Split
            <i class="fas fa-arrow-right"></i>
        </button>

        <!-- dynamic results area with PI Coin symbols instead of $ -->
        <div id="resultArea" class="hidden">
            <div class="results-panel fade-up">
                <div class="result-item">
                    <span class="result-label"><i class="fas fa-chart-line"></i> Net Balance</span>
                    <span class="result-value balance-value" id="balanceDisplay"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
                <div class="result-item" style="background: rgba(255, 200, 80, 0.03);">
                    <span class="result-label"><i class="fas fa-chart-pie"></i> 45% Share (π)</span>
                    <span class="result-value" id="share45Display"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
                <div class="result-item" style="background: rgba(255, 200, 80, 0.01);">
                    <span class="result-label"><i class="fas fa-chart-pie"></i> 55% Share (π)</span>
                    <span class="result-value" id="share55Display"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
            </div>
            <div class="footer-note">
                <i class="fas fa-circle-info"></i> π PI Coin · net amount after fee split into 45% & 55%
                <i class="fas fa-coins" style="opacity:0.7;"></i>
            </div>
        </div>
    </div>
</div>
</body>
</html>
