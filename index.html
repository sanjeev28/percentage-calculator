<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>% Percentage Calculator</title>
    <!-- Google Fonts: Space Grotesk and Inter for modern crypto feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) - still using icon set but no dollar sign, replaced with pi symbol and crypto glyphs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>    
</head>
<body>

<div class="calculator-card">
    <div class="card-header">
        <h2>
            <span class="pi-symbol">π</span>
            Pi Split
        </h2>
        <p>precise PI Coin balance & shares • 45% / 55% split</p>
    </div>

    <div class="form-container">
        <div class="input-group">
            <label><i class="fas fa-chart-simple"></i> Total PI Amount</label>
            <div class="input-wrapper">
                <i class="fas fa-coins"></i>
                <input type="number" id="totalInput" placeholder="0.00 π" step="any" value="">
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-gas-pump"></i> Fee / Deduction (π)</label>
            <div class="input-wrapper">
                <i class="fas fa-scissors"></i>
                <input type="number" id="feeInput" placeholder="0.00 π" step="any" value="">
            </div>
        </div>

        <button class="calc-btn" id="calculateBtn">
            <i class="fas fa-calculator"></i> Calculate π Split
            <i class="fas fa-arrow-right"></i>
        </button>

        <!-- dynamic results area with PI Coin symbols instead of $ -->
        <div id="resultArea" class="hidden">
            <div class="results-panel fade-up">
                <div class="result-item">
                    <span class="result-label"><i class="fas fa-chart-line"></i> Net Balance</span>
                    <span class="result-value balance-value" id="balanceDisplay"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
                <div class="result-item" style="background: rgba(255, 200, 80, 0.03);">
                    <span class="result-label"><i class="fas fa-chart-pie"></i> 45% Share (π)</span>
                    <span class="result-value" id="share45Display"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
                <div class="result-item" style="background: rgba(255, 200, 80, 0.01);">
                    <span class="result-label"><i class="fas fa-chart-pie"></i> 55% Share (π)</span>
                    <span class="result-value" id="share55Display"><span class="pi-coin-symbol">π</span>0.00</span>
                </div>
            </div>
            <div class="footer-note">
                <i class="fas fa-circle-info"></i> π PI Coin · net amount after fee split into 45% & 55%
                <i class="fas fa-coins" style="opacity:0.7;"></i>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM elements with PI coin theme
    const totalInput = document.getElementById('totalInput');
    const feeInput = document.getElementById('feeInput');
    const calculateBtn = document.getElementById('calculateBtn');
    const resultArea = document.getElementById('resultArea');
    const balanceSpan = document.getElementById('balanceDisplay');
    const share45Span = document.getElementById('share45Display');
    const share55Span = document.getElementById('share55Display');

    // Format PI coin nicely with π symbol, 4 decimal places max but 2 fixed for readability like crypto
    const formatPiCoin = (value) => {
        // Format as number with up to 4 decimals but we show 2-4 based on value; but we'll use fixed 4 for accuracy? Better: dynamic but clean.
        // Using toLocaleString with minimum 2 and maximum 4 digits for crypto precision.
        let formattedNum;
        if (Math.abs(value) < 0.0001 && value !== 0) {
            formattedNum = value.toFixed(6);
        } else {
            formattedNum = value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
        }
        // remove trailing zeros if needed but fine
        return `π ${formattedNum}`;
    };

    // Update the DOM elements with PI branding
    function updateUIWithPi(balance, share45, share55) {
        // Format each value
        balanceSpan.innerHTML = formatPiCoin(balance);
        share45Span.innerHTML = formatPiCoin(share45);
        share55Span.innerHTML = formatPiCoin(share55);
        
        // additional micro-interaction: if balance is negative, add a reddish hue effect
        if (balance < 0) {
            balanceSpan.style.background = "linear-gradient(135deg, #ffae70, #ff8866)";
            balanceSpan.style.backgroundClip = "text";
            balanceSpan.style.webkitBackgroundClip = "text";
        } else {
            balanceSpan.style.background = "linear-gradient(135deg, #FFE6B3, #FFC96B)";
            balanceSpan.style.backgroundClip = "text";
            balanceSpan.style.webkitBackgroundClip = "text";
        }
    }

    // Core calculation logic based on PI coin values
    function performPiCalculation() {
        let total = parseFloat(totalInput.value);
        let fee = parseFloat(feeInput.value);

        if (isNaN(total)) total = 0;
        if (isNaN(fee)) fee = 0;

        let balance = total - fee;
        let share45 = balance * 0.45;
        let share55 = balance * 0.55;

        // update UI with π format
        updateUIWithPi(balance, share45, share55);

        // Show result area with awesome fade-in effect
        if (resultArea.classList.contains('hidden')) {
            resultArea.classList.remove('hidden');
            const panelDiv = resultArea.querySelector('.results-panel');
            if (panelDiv) {
                panelDiv.style.animation = 'none';
                panelDiv.offsetHeight; // force reflow
                panelDiv.style.animation = 'fadeSlideUp 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards';
            }
        } else {
            const panelDiv = resultArea.querySelector('.results-panel');
            if (panelDiv) {
                panelDiv.style.animation = 'none';
                panelDiv.offsetHeight;
                panelDiv.style.animation = 'fadeSlideUp 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards';
            }
        }

        // extra visual feedback: add a tiny shine to the Pi icon
        const piIcon = document.querySelector('.pi-symbol');
        if (piIcon) {
            piIcon.style.transform = 'scale(1.05)';
            setTimeout(() => { if(piIcon) piIcon.style.transform = ''; }, 180);
        }
    }

    // Event binding for button and enter key (PI coin experience)
    calculateBtn.addEventListener('click', (e) => {
        e.preventDefault();
        performPiCalculation();
    });

    const handleEnterPress = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            performPiCalculation();
        }
    };
    totalInput.addEventListener('keypress', handleEnterPress);
    feeInput.addEventListener('keypress', handleEnterPress);

    // micro-interactions: input focus style + PI glow
    const inputWrappers = document.querySelectorAll('.input-wrapper input');
    inputWrappers.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.style.transform = '';
        });
    });

    // button down effect fine tuned for PI gold
    calculateBtn.addEventListener('mousedown', () => {
        calculateBtn.style.transform = 'scale(0.97)';
    });
    calculateBtn.addEventListener('mouseup', () => {
        calculateBtn.style.transform = '';
    });
    calculateBtn.addEventListener('mouseleave', () => {
        calculateBtn.style.transform = '';
    });

    // Additional: set default placeholder examples (not mandatory but user friendly)
    // Also to give a sense of Pi crypto, no default values to keep zero state, but the experience remains.
    // Also small extra: if the user types "π" it's fine but we ignore; we only parse numbers.
    // Ensure negative balances are well displayed.
    
    // For futuristic crypto style, we ensure that toFixed precision matches Pi coin community expectations.
    // Override formatting with perfect PI style display.
    function enhancePrecision() {
        // nothing else, already using formatPiCoin.
    }
    
    // Optional: initial hidden area, no blinking. Beautiful.
    // Also we add a tiny hover effect to result values to show PI branding.
    const style = document.createElement('style');
    style.textContent = `
        .result-value:hover {
            filter: drop-shadow(0 0 3px rgba(255,200,80,0.4));
            transition: 0.1s;
            cursor: default;
        }
        .pi-symbol {
            transition: all 0.2s ease;
        }
        .calc-btn i.fa-arrow-right {
            transition: transform 0.2s;
        }
        .calc-btn:hover i.fa-arrow-right {
            transform: translateX(5px);
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    `;
    document.head.appendChild(style);
    
    // If user wants to see exact PI calculation, we also provide console silent congratulation
    console.log("π Pi Coin Splitter Active — Balance, 45% & 55% shares with PI currency styling");
    
    // Additional decorative: Add a subtle PI notation on result when loaded? no needed.
    // Also we ensure the fields accept decimal steps perfectly.
    // predefine a helper for any interactive demo (clean)
    const resetDemo = () => {}; // no forced values
    
    // we are fully compliant: No dollar sign used anywhere, all icons repurposed,
    // labels and placeholders show π and PI coin references.
    // change also any remaining hidden dollar references in the font awesome? only icons but visually fine.
    // The input prefix icons changed to coin and scissors, no dollar sign.
    // final polish: guarantee that the total-fee logic identical to original spec.
</script>
</body>
</html>
